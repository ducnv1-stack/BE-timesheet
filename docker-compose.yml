version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: revenue_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d revenue_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./BE-Ohari
      dockerfile: Dockerfile
    container_name: nest_backend
    restart: unless-stopped
    # Không mở port 3001 ra ngoài nữa, Nginx sẽ làm việc này
    volumes:
      - ./uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./BE-Ohari/.env
    environment:
      - NODE_ENV=production
      - PORT=3001

  frontend:
    build:
      context: ./FE-Ohari
      dockerfile: Dockerfile
      args:
        # Quan trọng: Trỏ API về domain qua Nginx (HTTPS)
        - NEXT_PUBLIC_API_URL=https://empire.ohari.jp/api
    container_name: next_frontend
    restart: unless-stopped
    # Không mở port 3000 ra ngoài nữa, Nginx sẽ làm việc này
    depends_on:
      - backend
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend

volumes:
  pg_data:
  redis_data: