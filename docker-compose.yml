version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: revenue_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - "6379:6379"

  backend:
    build: ./BE-Ohari
    container_name: nest_backend
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    env_file:
      - ./BE-Ohari/.env

volumes:
  pg_data:
